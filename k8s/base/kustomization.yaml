apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-factory

labels:
  - pairs:
      app.kubernetes.io/part-of: ai-factory
    includeSelectors: true

resources:
  - namespace.yaml
  - configmap.yaml
  - content-pvc.yaml
  - web-deployment.yaml
  - web-service.yaml
  - agent-deployment.yaml
  - agent-service.yaml
  - route.yaml
