apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ai-factory
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ai-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: ai-factory
    spec:
      initContainers:
        - name: seed-content
          image: web:latest
          command:
            - sh
            - -c
            - |
              if [ -z "$(ls -A /app/content 2>/dev/null)" ]; then
                echo "Seeding content from image..."
                cp -a /app/content-seed/. /app/content/
              else
                echo "Content already present, skipping seed."
              fi
          volumeMounts:
            - name: content-data
              mountPath: /app/content
      containers:
        - name: web
          image: web:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai-factory-config
            - secretRef:
                name: ai-factory-secrets
          volumeMounts:
            - name: content-data
              mountPath: /app/content
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: content-data
          persistentVolumeClaim:
            claimName: content-data
