apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ai-factory
  namespace: ai-factory
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: ai-factory
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: web
    weight: 100
  port:
    targetPort: 3001
