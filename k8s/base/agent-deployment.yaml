apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: ai-factory
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ai-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: ai-factory
    spec:
      containers:
        - name: agent
          image: agent:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai-factory-config
            - secretRef:
                name: ai-factory-secrets
          volumeMounts:
            - name: content-data
              mountPath: /app/content
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /list-apps
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /list-apps
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: content-data
          persistentVolumeClaim:
            claimName: content-data
