program:
  name: "Red Hat AI Factory"
  tagline: "From experimentation to repeatable business outcomes"
  description: >
    Red Hat AI Factory is Red Hat's methodology and technology platform for helping enterprises
    build, deploy, and scale production-ready AI. Combining Red Hat's proven enterprise platform
    with a curated ecosystem of technology partners, the AI Factory transforms isolated AI
    experiments into a repeatable, governed capability that delivers measurable business value.
  version: "2.0"
  industry_lead: financial-services
  industries:
    - financial-services
    - healthcare
    - manufacturing
    - energy
  customer_placeholder: "Customer"

  hero:
    headline: "From experimentation to repeatable business outcomes"
    subheadline: "Red Hat AI Factory — the methodology and platform for enterprise AI at scale"
    stats:
      - value: "88%"
        label: "of AI pilots fail to reach production"
        source: "IDC/Lenovo 2024"
      - value: "10x"
        label: "inference cost reduction every 12 months"
        source: "Industry benchmark"
      - value: "<4 weeks"
        label: "prototype to production deployment target"
        source: "AI Factory SLA"

  value_propositions:
    - id: methodology
      title: "Proven Methodology"
      description: "A seven-stage framework with value gates, deliverables, and decision points at every step — built from real enterprise engagements across financial services, healthcare, manufacturing, and energy."
      icon: map
    - id: technology-platform
      title: "Enterprise Technology Platform"
      description: "Red Hat AI Enterprise on Red Hat OpenShift provides the production-grade foundation — model lifecycle management, governed inference, and hybrid cloud deployment from a single platform."
      icon: layers
    - id: partner-ecosystem
      title: "Curated Partner Ecosystem"
      description: "Purpose-built integrations with leading hardware and software partners — NVIDIA, Intel, AMD, Dell, HPE, Lenovo, Cisco — so the platform works with the infrastructure you have or plan to acquire."
      icon: handshake
    - id: consulting-enablement
      title: "Red Hat Services & Enablement"
      description: "Red Hat Consulting, Training, and Technical Account Management embedded into every stage — enabling your teams to operate independently, not creating permanent dependencies."
      icon: users

  benefit_pillars:
    - id: accelerate-value
      title: "Accelerate Time to Value"
      description: "Move from concept to production AI in weeks, not quarters, with validated architectures and pre-built patterns."
      icon: zap
      details:
        - "Ready-to-deploy inference microservices and quickstarts"
        - "Pre-validated reference architectures for common patterns"
        - "Industry-specific use case templates and blueprints"
        - "Streamlined model onboarding with AI Hub catalog"
    - id: operational-efficiency
      title: "Increase Operational Efficiency"
      description: "Maximize GPU utilization, reduce serving costs, and scale AI workloads with intelligent resource management."
      icon: trending-up
      details:
        - "Optimized GPU utilization with intelligent scheduling"
        - "Scalable model serving with rate limiting and quotas"
        - "Centralized policy, governance, and visibility"
        - "Multi-tenant platform shared across business units"
    - id: mitigate-risk
      title: "Mitigate Risk"
      description: "Enterprise-grade security, compliance, and governance across the entire AI lifecycle — built for regulated industries."
      icon: shield
      details:
        - "Extended-lifetime production branches"
        - "Secure supply chain and STIG-hardened containers"
        - "Comprehensive governance gates at every stage"
        - "Full audit trails for regulated industries"

  factory_outputs:
    - id: decision-intelligence
      title: "Decision Intelligence"
      description: "AI-augmented decisions at enterprise speed — risk scoring, demand forecasting, pricing optimization, credit adjudication, and resource allocation with full explainability"
      icon: trending-up
    - id: operational-intelligence
      title: "Operational Intelligence"
      description: "Continuous detection of what humans miss — anomalous transactions, compliance drift, equipment degradation signals, and emerging patterns surfaced before they become incidents"
      icon: scan
    - id: intelligent-automation
      title: "Intelligent Automation"
      description: "End-to-end workflows that combine AI reasoning with enterprise systems — document processing, regulatory checking, predictive maintenance, and clinical documentation at scale"
      icon: bot
    - id: agentic-ai
      title: "Agentic AI"
      description: "Autonomous AI agents that reason, plan, and act — using enterprise tools and data to execute multi-step workflows with governance guardrails and human oversight"
      icon: brain

  tracks:
    - id: technical
      title: "Platform Maturity"
      description: "Seven maturity stages from discovery through continuous operations — staged capability building with value gates at every step"
    - id: organizational
      title: "Operating Model"
      description: "The governance, expertise, skills, culture, and change management that make the AI Factory sustainable — because technology without organizational readiness produces shelfware"

  why_ai_factory:
    - title: "Data sovereignty"
      description: "Your data never leaves your perimeter. Models train and serve on infrastructure you own and control."
    - title: "Competitive differentiation"
      description: "Models fine-tuned on proprietary data create capabilities competitors cannot replicate by subscribing to the same API."
    - title: "Operational control"
      description: "Sub-200ms inference SLAs, automated governance gates, and full audit trails — because regulated industries demand it."
    - title: "Production at scale"
      description: "Move from isolated experiments to a repeatable factory that any team can use to build, deploy, and monitor AI."

  ai_use_case_categories:
    - "Predictive ML"
    - "Generative AI"
    - "Agentic AI"
    - "Physical AI"

  services_package:
    title: "Red Hat Services Starter Package for AI Factory"
    subtitle: "Accelerate to production with Red Hat Services"
    description: "Deploy AI Factory confidently with expert guidance at every stage"
    phases:
      - id: consulting
        title: "Red Hat Consulting"
        timeline: "Weeks 1-8"
        milestone: "Architecture design & deployment"
        description: "Expert hands-on collaboration to design and deploy initial architecture, working alongside your team and technology partners."
        details:
          - "Expert hands-on collaboration to design and deploy initial architecture"
          - "Focus on a specific use case(s), including onboarding onto the production platform"
          - "Coordinate with technology partners for hardware and software enablement"
      - id: use-case-onboarding
        title: "Use Case Onboarding"
        timeline: "Weeks 9-12+"
        milestone: "One use case in production"
        description: "Guided onboarding of the first production use case end-to-end, with knowledge transfer to internal teams."
      - id: training
        title: "Red Hat Training"
        timeline: "Ongoing"
        milestone: "Skills enablement"
        description: "Build skills to operate and extend independently with GenAIOps Enablement with Red Hat AI Enterprise (AI501) course."
        details:
          - "GenAIOps Enablement with Red Hat AI Enterprise (AI501) course"
          - "Continue learning with access to Red Hat Learning Subscription"
      - id: tam
        title: "Red Hat Technical Account Management"
        timeline: "Ongoing"
        milestone: "Day 2 advisory & scaling"
        description: "Receive ongoing Day 2 advisory support and guidance as you scale use cases and onboard new lines of business."
        details:
          - "Ongoing Day 2 advisory support and guidance"
          - "Scale use cases and onboard new lines of business"

  how_to_get:
    title: "How to get started with Red Hat AI Factory"
    subtitle: "A validated methodology delivered through Red Hat and its partner ecosystem"
    validated_system:
      - "Proven methodology with seven value-gated stages"
      - "Red Hat AI Enterprise as the technology foundation"
      - "Curated partner ecosystem for hardware and software"
      - "Red Hat Services for consulting, training, and ongoing support"
    channels:
      - "Red Hat direct engagement"
      - "Technology partners (NVIDIA, Intel, AMD, Dell, HPE, Lenovo, Cisco)"
      - "System Integrators and consulting partners"

  next_steps:
    steps:
      - "Engage Red Hat for an AI Factory Discovery & Assessment"
      - "Identify your first 2-3 high-value use cases"
      - "Assess infrastructure readiness with your preferred technology partners"
      - "Start with Red Hat Services Starter Package"
    call_to_action: "The methodology is proven. The technology is ready. The partners are aligned. When do you start?"

  principles:
    - "Practitioner-to-practitioner — substance over slides"
    - "Industry-specific examples with financial services as the reference implementation"
    - "Value gates between stages — progress when KPIs are met, not when time runs out"
    - "Platform-first — consulting enables, the platform endures"
    - "Partner-neutral methodology — the framework works with any hardware ecosystem"
    - "Nothing hardcoded — all content configurable via YAML and markdown"
