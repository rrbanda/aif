program:
  name: "Red Hat AI Factory with NVIDIA"
  tagline: "Accelerate development and delivery of AI solutions"
  description: >
    A unified, co-engineered foundation for building, deploying, and scaling production-ready AI.
    Red Hat AI Factory with NVIDIA combines Red Hat AI Enterprise and NVIDIA AI Enterprise to
    deliver an end-to-end solution optimized for NVIDIA hardware environments — accelerating
    the path from experimentation to production through a unified platform.
  version: "1.0"
  industry_lead: financial-services
  industries:
    - financial-services
    - healthcare
    - manufacturing
    - energy
  customer_placeholder: "Customer"

  hero:
    headline: "Accelerate development and delivery of AI solutions"
    subheadline: "Red Hat AI Factory with NVIDIA — from experimentation to repeatable business outcomes"
    stats:
      - value: "88%"
        label: "of AI pilots fail to reach production"
        source: "IDC/Lenovo 2024"
      - value: "10x"
        label: "inference cost reduction every 12 months"
        source: "Industry benchmark"
      - value: "<4 weeks"
        label: "prototype to production deployment target"
        source: "AI Factory SLA"

  value_propositions:
    - id: production-ready
      title: "Production-Ready Foundation"
      description: "Accelerate the path from experimentation to production through a unified platform for building, deploying, and scaling AI-ready applications."
      icon: rocket
    - id: collaborative-expertise
      title: "Collaborative Expertise"
      description: "A joint offering that combines Red Hat AI Enterprise and NVIDIA AI Enterprise to deliver an end-to-end solution optimized for NVIDIA hardware environments."
      icon: handshake
    - id: unified-solution
      title: "Unified AI Solution"
      description: "Integrates the engineering and support expertise of both Red Hat and NVIDIA to deliver a trusted, enterprise-grade platform."
      icon: layers
    - id: streamlined-ops
      title: "Streamlined Operations"
      description: "Empowers IT operations teams to streamline management of both traditional infrastructure and the evolving demands of the AI stack."
      icon: settings

  benefit_pillars:
    - id: accelerate-value
      title: "Accelerate Time to Value"
      description: "Accelerate AI from concept to production with simplified workflows, validated blueprints, and optimized models."
      icon: zap
      details:
        - "Ready-to-deploy NIM microservices and blueprints"
        - "Red Hat AI quickstarts for common enterprise patterns"
        - "NVIDIA AI Blueprints for industry-specific use cases"
        - "Pre-validated reference architectures"
    - id: operational-efficiency
      title: "Increase Operational Efficiency"
      description: "Maximize efficiency and cut costs with optimized AI inference, scalable serving, and intelligent resource management."
      icon: trending-up
      details:
        - "Optimized GPU utilization with intelligent scheduling"
        - "Scalable model serving with rate limiting and quotas"
        - "Simplified node-based pricing"
        - "Centralized policy, governance, and visibility"
    - id: mitigate-risk
      title: "Mitigate Risk"
      description: "Secure, compliant, and trustworthy AI factory with Red Hat and NVIDIA across your hybrid cloud."
      icon: shield
      details:
        - "Extended-lifetime production branches"
        - "Secure supply chain and STIG-hardened containers"
        - "Comprehensive governance gates at every stage"
        - "Full audit trails for regulated industries"

  factory_outputs:
    - id: predictions
      title: "Predictions"
      description: "Real-time scoring and forecasting — fraud probability, credit risk, market signals, demand forecasting, clinical risk stratification"
      icon: trending-up
    - id: pattern-recognition
      title: "Pattern Recognition"
      description: "Detecting what humans miss — anomalous transactions, regulatory changes, equipment degradation, disease markers, grid anomalies"
      icon: scan
    - id: process-automation
      title: "Process Automation"
      description: "End-to-end intelligent workflows — compliance checking, document routing, agentic operations, predictive maintenance, clinical documentation"
      icon: bot
    - id: agentic-ai
      title: "Agentic AI"
      description: "Autonomous AI agents that reason, plan, and act — using enterprise tools and data to execute multi-step workflows with governance guardrails"
      icon: brain

  tracks:
    - id: technical
      title: "Technical Track"
      description: "Seven maturity stages from discovery through continuous operations — platform, data, models, governance, and production AI at scale"
    - id: organizational
      title: "Organizational Track"
      description: "The people side of the factory — governance, expertise, skills, culture, and change management that make AI sustainable"

  why_ai_factory:
    - title: "Data sovereignty"
      description: "Your data never leaves your perimeter. Models train and serve on infrastructure you own and control."
    - title: "Competitive differentiation"
      description: "Models fine-tuned on proprietary data create capabilities competitors cannot replicate by subscribing to the same API."
    - title: "Operational control"
      description: "Sub-200ms inference SLAs, automated governance gates, and full audit trails — because regulated industries demand it."
    - title: "Production at scale"
      description: "Move from isolated experiments to a repeatable factory that any team can use to build, deploy, and monitor AI."

  platform_availability:
    current:
      name: "NVIDIA Blackwell"
      status: "Available Now"
    upcoming:
      name: "NVIDIA Rubin"
      status: "H2 2026"
      note: "Day 0 support"

  ai_use_case_categories:
    - "Predictive ML"
    - "Generative AI"
    - "Agentic AI"
    - "Physical AI"

  services_package:
    title: "Red Hat Services Starter Package for AI Factory"
    subtitle: "Accelerate to production with Red Hat Services"
    description: "Deploy AI Factory confidently with support from our experts"
    phases:
      - id: consulting
        title: "Red Hat Consulting"
        timeline: "Weeks 1-8"
        milestone: "Architecture design & deployment"
        description: "Expert hands-on collaboration to design and deploy initial architecture. Focus on a specific use case(s), including onboarding onto the production platform."
        details:
          - "Expert hands-on collaboration to design and deploy initial architecture"
          - "Focus on a specific use case(s), including onboarding onto the production platform"
          - "Red Hat Consulting accesses NVIDIA expertise"
      - id: use-case-onboarding
        title: "Use Case Onboarding"
        timeline: "Weeks 9-12+"
        milestone: "One use case onboarding"
        description: "Guided onboarding of the first production use case end-to-end, with knowledge transfer to internal teams."
      - id: training
        title: "Red Hat Training"
        timeline: "Ongoing"
        milestone: "Skills enablement"
        description: "Build skills to operate and extend independently with GenAIOps Enablement with Red Hat AI Enterprise (AI501) course."
        details:
          - "GenAIOps Enablement with Red Hat AI Enterprise (AI501) course"
          - "Continue learning with access to Red Hat Learning Subscription"
      - id: tam
        title: "Red Hat Technical Account Management"
        timeline: "Ongoing"
        milestone: "Day 2 advisory & scaling"
        description: "Receive ongoing Day 2 advisory support and guidance as you scale use cases and onboard new lines of business."
        details:
          - "Ongoing Day 2 advisory support and guidance"
          - "Scale use cases and onboard new lines of business"

  how_to_get:
    title: "How to get Red Hat AI Factory with NVIDIA"
    subtitle: "A validated system delivered through a value chain of partners"
    validated_system:
      - "Pre-validated for production scale"
      - "Streamlined commercial joint solution"
      - "Simplified node-based pricing"
      - "Economics designed to accelerate"
    channels:
      - "OEMs"
      - "Value Added Resellers"
      - "Distribution"

  next_steps:
    steps:
      - "Review the datasheet"
      - "Engage your preferred OEM, VAR, or Distributor in the Red Hat and NVIDIA network"
      - "Accelerate with Red Hat Services"
      - "Start with your use cases"
    call_to_action: "The platform is ready. The services are ready. When do you start?"

  principles:
    - "Practitioner-to-practitioner — substance over slides"
    - "Industry-specific examples with financial services as the reference implementation"
    - "Value gates between stages — progress when KPIs are met, not when time runs out"
    - "Platform-first — consulting enables, the platform endures"
    - "Nothing hardcoded — all content configurable via YAML and markdown"
