  # ============================================================
  # PROCESS AGENTS — Structured workflows using ADK agent types
  # ============================================================

  # --- Readiness Assessment (Custom Agent with conditional logic) ---

  - id: readiness-assessment
    type: sequential
    name: "AI Factory Readiness Assessment"
    description: "Structured assessment of customer AI readiness across 5 dimensions, run sequentially with the synthesizer applying conditional logic based on assessment results"
    sub_agents:
      - data-readiness-assessor
      - org-maturity-assessor
      - team-composition-assessor
      - infra-assessor
      - use-case-assessor
      - assessment-synthesizer

  - id: data-readiness-assessor
    type: llm
    name: "Data Readiness Assessor"
    description: "Evaluates data pipeline maturity, governance, and AI-readiness"
    model: gemini-2.5-pro
    temperature: 0.3
    prompt_file: "prompts/workflow/assess_data.md"
    output_key: "data_readiness_score"
    tools:
      - read_config
      - read_content
      - search_content
    skills:
      - data-strategy

  - id: org-maturity-assessor
    type: llm
    name: "Organizational Maturity Assessor"
    description: "Evaluates organizational structure for AI — ad-hoc, pod, division, or factory model"
    model: gemini-2.5-pro
    temperature: 0.3
    prompt_file: "prompts/workflow/assess_org.md"
    output_key: "org_maturity_level"
    tools:
      - read_config
      - read_content

  - id: team-composition-assessor
    type: llm
    name: "Team Composition Assessor"
    description: "Evaluates team readiness — data scientists, ML engineers, platform engineers, governance roles"
    model: gemini-2.5-pro
    temperature: 0.3
    prompt_file: "prompts/workflow/assess_team.md"
    output_key: "team_readiness"
    tools:
      - read_config
      - read_content

  - id: infra-assessor
    type: llm
    name: "Infrastructure Assessor"
    description: "Evaluates compute, GPU, network, and storage readiness for AI workloads"
    model: gemini-2.5-pro
    temperature: 0.3
    prompt_file: "prompts/workflow/assess_infra.md"
    output_key: "infra_readiness"
    tools:
      - read_config
      - read_content
    skills:
      - platform-operations

  - id: use-case-assessor
    type: llm
    name: "Use Case Pipeline Assessor"
    description: "Evaluates use case pipeline volume, diversity, scoring, and stakeholder commitment"
    model: gemini-2.5-pro
    temperature: 0.3
    prompt_file: "prompts/workflow/assess_use_cases.md"
    output_key: "use_case_inventory"
    tools:
      - read_config
