      - search_content
    skills:
      - use-case-patterns

  - id: assessment-synthesizer
    type: llm
    name: "Assessment Synthesizer"
    description: "Combines all assessment dimension results into a unified readiness report, persists to customer account, and saves state for downstream workflows"
    model: gemini-2.5-pro
    temperature: 0.4
    prompt_file: "prompts/workflow/assess_synthesize.md"
    output_key: "overall_assessment"
    tools:
      - read_config
      - read_content
      - save_assessment_results
      - save_workflow_state
    skills:
      - model-governance
      - ai-factory-methodology

  # --- Content Pipeline (Sequential + Loop) ---

  - id: content-pipeline
    type: sequential
    name: "Content Creation Pipeline"
    description: "Structured content creation with iterative review and quality gates — draft, review loop, then write"
    sub_agents:
      - content-drafter
      - content-review-loop
      - content-finalizer

  - id: content-drafter
    type: llm
    name: "Content Drafter"
    description: "Generates initial content draft based on context and requirements"
    model: gemini-2.5-pro
    temperature: 0.5
    prompt_file: "prompts/workflow/content_draft.md"
    output_key: "draft"
    tools:
      - read_config
      - read_content
      - search_content

  - id: content-review-loop
    type: loop
    name: "Content Review Loop"
    description: "Iteratively reviews and revises content until quality passes"
    sub_agents:
      - content-reviewer
      - content-reviser
    workflow_config:
      max_iterations: 3

  - id: content-reviewer
    type: llm
    name: "Content Reviewer"
    description: "Reviews draft for accuracy, tone, completeness, and alignment with AI Factory standards. Calls exit_loop when quality is satisfactory."
    model: gemini-2.5-pro
    temperature: 0.3
    prompt_file: "prompts/workflow/content_review.md"
    output_key: "review_feedback"
    tools:
      - read_config
      - read_content
      - exit_loop

  - id: content-reviser
    type: llm
    name: "Content Reviser"
    description: "Revises content based on reviewer feedback"
    model: gemini-2.5-pro
    temperature: 0.4
    prompt_file: "prompts/workflow/content_revise.md"
    output_key: "draft"
    tools:
      - read_content

  - id: content-finalizer
    type: llm
    name: "Content Finalizer"
    description: "Writes final approved content to file and commits"
    model: gemini-2.5-pro
    temperature: 0.2
    prompt_file: "prompts/workflow/content_finalize.md"
    tools:
      - write_content
      - git_commit

  # --- Program Planner (Sequential) ---

  - id: program-planner
