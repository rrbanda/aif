id: fraud-scorer-v1
name: Transaction Fraud Scorer
use_case_id: fraud-detection-realtime
model_type: xgboost
framework: XGBoost 2.0
version: "1.3.2"
description: >
  Real-time transaction fraud scoring model using gradient boosted trees on 150+ engineered features.
  Trained on 18 months of transaction data with 2.3M labeled fraud events. Scores each transaction
  before authorization response — sub-100ms P95 latency target. Replaces legacy rules-based system
  that had 12% false positive rate.
status: deployed
created: "2026-01-20"
updated: "2026-03-05"

training_data:
  source: "Transaction data warehouse — 18 months, 2.1B transactions"
  fraud_events: 2_300_000
  features: 152
  class_balance: "0.11% positive (fraud) — addressed via SMOTE + class weighting"
  data_splits:
    train: "70% (temporal split — pre-2025-07)"
    validation: "15% (2025-07 to 2025-10)"
    test: "15% (2025-10 to 2026-01)"
  preprocessing: "Feature engineering via internal feature store. No PII in feature set — tokenized card IDs, hashed merchant categories."

lifecycle_history:
  - stage: experiment
    timestamp: "2026-01-20T10:00:00Z"
    actor: "ML Team"
    notes: Initial model training on 6 months of transaction data
  - stage: experiment
    timestamp: "2026-01-25T14:00:00Z"
    actor: "ML Team"
    notes: Extended to 18 months of data, added 30 new features from merchant risk scoring
  - stage: registered
    timestamp: "2026-02-01T14:30:00Z"
    actor: "Tom Chen"
    notes: Registered after achieving 0.97 AUC on holdout set
  - stage: validated
    timestamp: "2026-02-15T09:00:00Z"
    actor: "Model Risk"
    notes: Passed SR 11-7 validation — bias testing across demographic segments, adversarial robustness verified
  - stage: deployed
    timestamp: "2026-03-05T11:00:00Z"
    actor: "ML Platform"
    notes: Deployed to production on OpenShift AI serving — 5% traffic canary, then full rollout

metrics:
  accuracy: 0.97
  f1_score: 0.94
  precision: 0.96
  recall: 0.92
  auc_roc: 0.97
  latency_p95_ms: 45
  latency_p50_ms: 22
  throughput_rps: 1200
  drift_score: 0.08
  error_rate: 0.002
  data_quality_score: 0.95
  false_positive_rate: 0.048

governance:
  bias_tested: true
  security_scanned: true
  performance_validated: true
  data_lineage_documented: true
  model_card_completed: true
  risk_classification: high
  bias_details:
    demographic_parity: "Within 2% across all segments"
    equalized_odds: "Satisfies at 95% CI"
    test_segments: ["age_group", "geography", "account_type"]
  approvals:
    - approver: "Chief Risk Officer"
      date: "2026-02-20"
      status: approved
    - approver: "Head of Fraud Operations"
      date: "2026-02-22"
      status: approved

retraining:
  schedule: "Monthly — triggered by data drift threshold (>0.15) or scheduled 30-day cycle"
  last_retrained: "2026-03-01"
  next_scheduled: "2026-04-01"
  auto_trigger: true
  trigger_metric: drift_score
  trigger_threshold: 0.15

deployment:
  endpoint: /api/v1/fraud-score
  replicas: 3
  gpu_required: false
  container_image: registry.internal/ml/fraud-scorer:1.3.2
  serving_runtime: kserve
  canary_strategy: "5% traffic for 24h, then progressive rollout"
  rollback_plan: "Automatic rollback if accuracy drops below 0.93 or latency exceeds 100ms P95"
